<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Modelo 3D de ladrillo - Procedural</title>
    <style>
        :root{
            --ui-bg: rgba(18,20,22,0.75);
            --panel: rgba(255,255,255,0.06);
            --accent: #5e5a5a;
            --glass: rgba(250, 21, 21, 0.06);
            --muted: #bfc5c9;
            --glass-border: rgba(255,255,255,0.06);
            --radius: 12px;
            --shadow: 0 6px 18px rgba(3,6,10,0.45);
        }

        html,body{height:100%;margin:0;font-family:Inter,Segoe UI,Roboto, system-ui, Arial;background:#000;}
        /* Página: permitimos una imagen de fondo llamada bg.jpg en la misma carpeta.
           También se puede pegar o arrastrar una imagen sobre la ventana para aplicarla. */
        body{
            background-color:#000;
            background-image:url('bg.jpg');
            background-position:center center;
            background-repeat:no-repeat;
            background-size:cover;
            background-attachment:fixed;
            transition: background-image 240ms ease-in-out;
        }

        #container{width:100%;height:100%;display:block;overflow:hidden;background:transparent}

        .ui{position:absolute;right:18px;top:18px;z-index:20;min-width:220px;max-width:320px;background:var(--ui-bg);-webkit-backdrop-filter:blur(6px) saturate(1.05);backdrop-filter:blur(6px) saturate(1.05);color:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:12px;display:flex;flex-direction:column;gap:10px}
        .ui .header-row{display:flex;align-items:center;justify-content:space-between;gap:10px}

        .ui .title{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px}
        .ui .subtitle{font-size:12px;color:var(--muted);margin-top:-4px}

        .controls{display:flex;gap:8px;flex-wrap:wrap}
        .btn{appearance:none;border:0;cursor:pointer;padding:8px 10px;border-radius:8px;font-weight:600;background:transparent;color:#fff;display:inline-flex;align-items:center;gap:8px}
        .btn svg{width:16px;height:16px;opacity:0.95}
        .btn-primary{background:linear-gradient(90deg,var(--accent),#c4570f);box-shadow:0 6px 14px rgba(255,122,89,0.18);color:#111}
        .btn-ghost{border:1px solid var(--glass-border);background:transparent}
        .btn:active{transform:translateY(1px)}

        .minimize-btn{width:30px;height:30px;justify-content:center;flex:0 0 auto;padding:0}
        .ui.is-collapsed{min-width:180px;max-width:180px;padding:10px}
        .ui.is-collapsed .subtitle,
        .ui.is-collapsed .controls,
        .ui.is-collapsed .status,
        .ui.is-collapsed .footer{display:none}
        .ui.is-collapsed .header-row{justify-content:flex-start}

        .status{font-size:13px;color:var(--muted);padding:8px;border-radius:8px;background:var(--panel);}

        .footer{font-size:12px;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
        .link{color:#fff;opacity:0.85;text-decoration:none}

        @media(max-width:520px){.ui{left:10px;right:10px;top:auto;bottom:12px;flex-direction:row;align-items:center;gap:8px;padding:8px}}
    </style>
</head>

<body>
    <div id="container"></div>
    <div class="ui">
        <div class="header-row">
            <div>
            <div class="title">
                Ladrillo ecológico — Procedural
            </div>
            <div class="subtitle">Modelo 3D fotorrealista generado en el navegador</div>
            </div>
        </div>

        <!-- Botones eliminados por petición: solo título y subtítulo permanecen -->
    </div>

        <!-- Intento de cargar Three.js UMD (funciona desde file:// en la mayoría de navegadores) -->
        <script src="https://unpkg.com/three@0.152.2/build/three.min.js"></script>

        <script>
            // Background image loader: tries bg.jpg by default and supports paste/drag-drop
            (function(){
                function tryDefaultBg(){
                    // attempt to load bg.jpg placed next to index.html — use absolute path based on location
                    try {
                        const url = new URL('bg.jpg', location.href).href;
                        const img = new Image(); img.onload = ()=>{ document.body.style.backgroundImage = `url('${url}')`; };
                        img.onerror = ()=>{/* no default bg found */}; img.src = url;
                    } catch (e) {
                        const url = 'bg.jpg'; const img = new Image(); img.onload = ()=>{ document.body.style.backgroundImage = `url('${url}')`; }; img.onerror = ()=>{}; img.src = url;
                    }
                }
                function applyImageFile(file){
                    const url = URL.createObjectURL(file);
                    document.body.style.backgroundImage = `url(${url})`;
                    // revoke later
                    setTimeout(()=>URL.revokeObjectURL(url), 20000);
                }
                // paste handler
                window.addEventListener('paste', (e)=>{
                    const items = (e.clipboardData || e.originalEvent.clipboardData).items;
                    for(const it of items){ if (it.type && it.type.indexOf('image')!==-1){ const f = it.getAsFile(); applyImageFile(f); e.preventDefault(); return; }}
                });
                // drag & drop
                window.addEventListener('dragover', (e)=>{ e.preventDefault(); });
                window.addEventListener('drop', (e)=>{ e.preventDefault(); const f = e.dataTransfer.files && e.dataTransfer.files[0]; if (f && f.type.indexOf('image')!==-1) applyImageFile(f); });
                // try default on load
                tryDefaultBg();
            })();

            const statusEl = document.getElementById('status');
            const container = document.getElementById('container');
            const uiPanel = document.querySelector('.ui');
            const togglePanelButton = document.getElementById('togglePanel');

            if (togglePanelButton) {
                togglePanelButton.addEventListener('click', () => {
                    const collapsed = uiPanel.classList.toggle('is-collapsed');
                    togglePanelButton.textContent = collapsed ? '+' : '–';
                    togglePanelButton.title = collapsed ? 'Expandir opciones' : 'Minimizar opciones';
                    togglePanelButton.setAttribute('aria-label', togglePanelButton.title);
                });
            }

            function startFallback2D(){
                if (statusEl) statusEl.textContent = 'Fallback 2D — Three.js no disponible';
                container.innerHTML = '';
                const canvas = document.createElement('canvas'); canvas.style.width='100%'; canvas.style.height='100%'; canvas.style.background='transparent'; canvas.width = Math.max(800, Math.min(2048, window.innerWidth * devicePixelRatio)); canvas.height = Math.max(600, Math.min(2048, window.innerHeight * devicePixelRatio)); container.appendChild(canvas);
                const ctx = canvas.getContext('2d');
                function draw(){ const w=canvas.width,h=canvas.height; ctx.clearRect(0,0,w,h); ctx.globalAlpha=0.18; ctx.fillStyle='#111'; for(let i=0;i<7000;i++)ctx.fillRect(Math.random()*w,Math.random()*h,Math.random()*2,Math.random()*2); ctx.globalAlpha=0.95; const cols=['#3ea2ff','#ff6b6b','#ffd166','#6be28a']; for(let i=0;i<450;i++){ctx.fillStyle=cols[Math.floor(Math.random()*cols.length)]; ctx.beginPath(); ctx.ellipse(Math.random()*w,Math.random()*h,2+Math.random()*8,1+Math.random()*6,Math.random()*Math.PI,0,Math.PI*2); ctx.fill()} ctx.strokeStyle='rgba(255,255,255,0.02)'; ctx.lineWidth=1.2; for(let i=0;i<240;i++){ctx.beginPath();let x=Math.random()*w,y=Math.random()*h;ctx.moveTo(x,y);for(let j=0;j<4;j++){x+=Math.random()*80-40;y+=Math.random()*60-30;ctx.lineTo(x,y);}ctx.stroke()} ctx.globalCompositeOperation='source-over';
                }
                draw();
                const regenBtn = document.getElementById('regen'); if (regenBtn) regenBtn.addEventListener('click',(e)=>{e.preventDefault(); draw(); if (statusEl) statusEl.textContent='Textura regenerada';});
                const toggleCutBtn = document.getElementById('toggleCut'); if (toggleCutBtn) toggleCutBtn.addEventListener('click',()=>{ if (statusEl) statusEl.textContent='Vista de corte no disponible en fallback';});
                const exportGLBBtn = document.getElementById('exportGLB'); if (exportGLBBtn) exportGLBBtn.addEventListener('click',()=>{ if (statusEl) statusEl.textContent='Export GLB no disponible en fallback';});
                window.addEventListener('resize',()=>{ canvas.width = Math.max(800, Math.min(2048, window.innerWidth * devicePixelRatio)); canvas.height = Math.max(600, Math.min(2048, window.innerHeight * devicePixelRatio)); draw(); });
            }

            // Si Three.js se ha cargado como UMD, inicializamos la escena 3D.
            if (window.THREE) {
                try {
                    if (statusEl) statusEl.textContent = 'Three.js detectado — render 3D iniciando...';
                    container.innerHTML = '';
                    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                    renderer.setPixelRatio(window.devicePixelRatio);
                    renderer.setSize(window.innerWidth, window.innerHeight);
                    renderer.outputEncoding = THREE.sRGBEncoding;
                    renderer.setClearColor(0x000000, 0);
                    container.appendChild(renderer.domElement);

                    const scene = new THREE.Scene(); scene.background = null;
                    const perspCamera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.01, 50);
                    perspCamera.position.set(1.6, 0.8, 1.6);
                    // cámara ortográfica para vistas axonométricas/ortográficas
                    const frustumSize = 2.6;
                    const aspect = window.innerWidth / window.innerHeight;
                    const orthoCamera = new THREE.OrthographicCamera(-frustumSize * aspect / 2, frustumSize * aspect / 2, frustumSize / 2, -frustumSize / 2, 0.01, 50);
                    orthoCamera.position.set(2.2, 2.0, 1.6);
                    orthoCamera.lookAt(0, 0, 0);
                    let activeCamera = perspCamera;
                    // Controles orbitales simples sin dependencia externa
                    const target = new THREE.Vector3(0, 0, 0);
                    // distancia inicial mayor => menos zoom al recargar
                    let distance = 4.0;
                    let isPointerDown = false;
                    let startX = 0, startY = 0, startLon = 0, startLat = 0;
                    let lon = -45, lat = 15;

                    function updateCameraFromAngles() {
                        const phi = THREE.MathUtils.degToRad(90 - lat);
                        const theta = THREE.MathUtils.degToRad(lon);
                        const cx = target.x + distance * Math.sin(phi) * Math.cos(theta);
                        const cy = target.y + distance * Math.cos(phi);
                        const cz = target.z + distance * Math.sin(phi) * Math.sin(theta);
                        // update both cameras positionally; active camera will render
                        perspCamera.position.set(cx, cy, cz);
                        perspCamera.lookAt(target);
                        orthoCamera.position.set(cx * 1.05, cy * 1.05, cz * 1.05);
                        orthoCamera.lookAt(target);
                    }

                    updateCameraFromAngles();

                    renderer.domElement.style.touchAction = 'none';
                    renderer.domElement.addEventListener('pointerdown', (e) => { isPointerDown = true; startX = e.clientX; startY = e.clientY; startLon = lon; startLat = lat; renderer.domElement.setPointerCapture(e.pointerId); });
                    renderer.domElement.addEventListener('pointermove', (e) => { if (!isPointerDown) return; const dx = e.clientX - startX, dy = e.clientY - startY; lon = startLon - dx * 0.25; lat = Math.max(-85, Math.min(85, startLat + dy * 0.25)); updateCameraFromAngles(); });
                    ['pointerup','pointercancel','pointerout','pointerleave'].forEach(ev=>renderer.domElement.addEventListener(ev, ()=>{ isPointerDown = false; }));
                    renderer.domElement.addEventListener('wheel', (e) => { e.preventDefault(); distance = Math.max(0.6, Math.min(6, distance + e.deltaY * 0.0025)); updateCameraFromAngles(); }, { passive: false });

                    scene.add(new THREE.AmbientLight(0xffffff, 0.25));
                    const key = new THREE.DirectionalLight(0xffffff, 1.2); key.position.set(2, 2, 1); scene.add(key);

                    // Textura base en canvas
                    const surfaceCanvas = document.createElement('canvas'); surfaceCanvas.width = 2048; surfaceCanvas.height = 2048; const sctx = surfaceCanvas.getContext('2d'); sctx.fillStyle = '#7f7f7f'; sctx.fillRect(0, 0, 2048, 2048); sctx.globalAlpha = 0.42; sctx.fillStyle = '#a9a9a9'; for (let i = 0; i < 8000; i++) sctx.fillRect(Math.random() * 2048, Math.random() * 2048, Math.random() * 2, Math.random() * 2); sctx.globalAlpha = 1; const cols = ['#4f4f4f', '#6b6b6b', '#8a8a8a', '#b0b0b0']; for (let i = 0; i < 900; i++) { sctx.fillStyle = cols[Math.floor(Math.random() * cols.length)]; sctx.beginPath(); sctx.ellipse(Math.random() * 2048, Math.random() * 2048, 2 + Math.random() * 8, 1 + Math.random() * 6, Math.random() * Math.PI, 0, Math.PI * 2); sctx.fill(); }
                    const surfaceTex = new THREE.CanvasTexture(surfaceCanvas); surfaceTex.encoding = THREE.sRGBEncoding; surfaceTex.wrapS = surfaceTex.wrapT = THREE.RepeatWrapping;

                    // --- Textura procedural de poros (height) + normal map ---
                    // Create a mask highlighting the shape edges (outer rim) so we can intensify pores there
                    function createShapeEdgeMask(size = 1024, edgeThickness = 0.12) {
                        const c = document.createElement('canvas'); c.width = c.height = size; const ctx = c.getContext('2d');
                        // profile points (must match createInterlockingGeometry)
                        const pts = [
                            [-0.65,  0.50],
                            [-0.30,  0.50],
                            [-0.30,  0.30],
                            [ 0.30,  0.30],
                            [ 0.30,  0.50],
                            [ 0.65,  0.50],
                            [ 0.65, -0.25],
                            [ 0.43, -0.25],
                            [ 0.43, -0.45],
                            [-0.43, -0.45],
                            [-0.43, -0.25],
                            [-0.65, -0.25],
                        ];
                        // compute bounds
                        let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
                        for(const p of pts){ minX=Math.min(minX,p[0]); maxX=Math.max(maxX,p[0]); minY=Math.min(minY,p[1]); maxY=Math.max(maxY,p[1]); }
                        const pad = 0.05; const spanX = maxX-minX, spanY = maxY-minY; const scale = Math.min(size/(spanX+pad*2), size/(spanY+pad*2));
                        const tx = (size - (spanX*scale))/2 - minX*scale; const ty = (size - (spanY*scale))/2 - minY*scale;

                        // draw outer shape (white)
                        ctx.fillStyle = 'white'; ctx.beginPath(); ctx.moveTo(pts[0][0]*scale + tx, size - (pts[0][1]*scale + ty));
                        for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0]*scale + tx, size - (pts[i][1]*scale + ty));
                        ctx.closePath(); ctx.fill();

                        // draw inner shrunk shape (black) to create rim
                        const shrink = 1 - edgeThickness; ctx.fillStyle = 'black'; ctx.beginPath();
                        ctx.moveTo((pts[0][0]*shrink)*scale + tx, size - ((pts[0][1]*shrink)*scale + ty));
                        for(let i=1;i<pts.length;i++) ctx.lineTo((pts[i][0]*shrink)*scale + tx, size - ((pts[i][1]*shrink)*scale + ty));
                        ctx.closePath(); ctx.fill();

                        // soften edges by drawing a few translucent strokes around the rim
                        ctx.globalCompositeOperation = 'source-over';
                        for(let k=1;k<=6;k++){
                            ctx.strokeStyle = `rgba(255,255,255,${0.06})`;
                            ctx.lineWidth = k*3; ctx.beginPath(); ctx.moveTo(pts[0][0]*scale + tx, size - (pts[0][1]*scale + ty));
                            for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0]*scale + tx, size - (pts[i][1]*scale + ty));
                            ctx.closePath(); ctx.stroke();
                        }
                        return c;
                    }

                    function createPoreHeightTexture(size = 1024, pores = 1200, maxR = 6, edgeMask=null, edgeBoost = 1.6) {
                        const c = document.createElement('canvas'); c.width = c.height = size; const ctx = c.getContext('2d');
                        // base mid-gray
                        ctx.fillStyle = '#888'; ctx.fillRect(0,0,size,size);
                        // random soft craters
                        for (let i=0;i<pores;i++){
                            const x = Math.random()*size; const y = Math.random()*size;
                            const r = 1 + Math.random()*maxR;
                            const g = ctx.createRadialGradient(x,y,r*0.1,x,y,r);
                            const darkness = 0.12 + Math.random()*0.42; // how deep
                            g.addColorStop(0, `rgba(0,0,0,${darkness})`);
                            g.addColorStop(1, 'rgba(0,0,0,0)');
                            ctx.globalCompositeOperation = 'multiply';
                            ctx.fillStyle = g;
                            ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
                            ctx.globalCompositeOperation = 'source-over';
                        }
                        // subtle noise to break tiling
                        ctx.globalAlpha = 0.06; for(let i=0;i<20000;i++){ ctx.fillStyle='black'; ctx.fillRect(Math.random()*size, Math.random()*size, 1,1); } ctx.globalAlpha=1;

                        if (edgeMask) {
                            // multiply height by edge mask to intensify pores at rim
                            const img = ctx.getImageData(0,0,size,size);
                            const maskCtx = edgeMask.getContext('2d');
                            const maskData = maskCtx.getImageData(0,0,size,size).data;
                            for (let i=0;i<img.data.length;i+=4){
                                const h = img.data[i]; // grayscale R
                                const m = maskData[i]/255; // mask alpha
                                const boosted = Math.min(255, h * (1 + m * edgeBoost));
                                img.data[i] = img.data[i+1] = img.data[i+2] = boosted;
                            }
                            ctx.putImageData(img,0,0);
                        }

                        return c;
                    }

                    function createNormalFromHeight(heightCanvas, strength = 1.0) {
                        const w = heightCanvas.width, h = heightCanvas.height;
                        const src = heightCanvas.getContext('2d').getImageData(0,0,w,h).data;
                        const nc = document.createElement('canvas'); nc.width = w; nc.height = h; const nctx = nc.getContext('2d');
                        const img = nctx.createImageData(w,h);
                        // compute simple sobel-like normals
                        const get = (x,y)=>{
                            x = Math.max(0, Math.min(w-1, x)); y = Math.max(0, Math.min(h-1, y));
                            return src[(y*w + x)*4]/255; // use red channel (grayscale)
                        };
                        for(let y=0;y<h;y++){
                            for(let x=0;x<w;x++){
                                const l = get(x-1,y); const r = get(x+1,y); const u = get(x,y-1); const d = get(x,y+1);
                                const dx = (r - l) * 0.5 * strength;
                                const dy = (d - u) * 0.5 * strength;
                                // normal vector
                                let nx = -dx, ny = -dy, nz = 1.0;
                                const len = Math.sqrt(nx*nx + ny*ny + nz*nz);
                                nx/=len; ny/=len; nz/=len;
                                const i = (y*w + x)*4;
                                img.data[i]   = Math.floor((nx*0.5 + 0.5)*255); // R
                                img.data[i+1] = Math.floor((ny*0.5 + 0.5)*255); // G
                                img.data[i+2] = Math.floor((nz*0.5 + 0.5)*255); // B
                                img.data[i+3] = 255;
                            }
                        }
                        nctx.putImageData(img,0,0);
                        return nc;
                    }

                    const edgeMask = createShapeEdgeMask(1024, 0.12);
                    const poreHeight = createPoreHeightTexture(1024, 1400, 8, edgeMask, 1.9);
                    const poreNormal = createNormalFromHeight(poreHeight, 2.6);
                    const poreHeightTex = new THREE.CanvasTexture(poreHeight); poreHeightTex.wrapS = poreHeightTex.wrapT = THREE.RepeatWrapping; poreHeightTex.repeat.set(6,2);
                    const poreNormalTex = new THREE.CanvasTexture(poreNormal); poreNormalTex.wrapS = poreNormalTex.wrapT = THREE.RepeatWrapping; poreNormalTex.repeat.set(6,2);
                    poreHeightTex.encoding = THREE.LinearEncoding; poreNormalTex.encoding = THREE.LinearEncoding;

                    // Geometría interlocking procedural + material metálico con grano fino
                    function createMetalGrainTexture(w = 2048, h = 512) {
                        const c = document.createElement('canvas'); c.width = w; c.height = h; const ctx = c.getContext('2d');
                        // base
                        ctx.fillStyle = '#bfbfbf'; ctx.fillRect(0, 0, w, h);
                        // brushed lines
                        ctx.globalAlpha = 0.85;
                        ctx.strokeStyle = '#d7d7d7';
                        for (let i = 0; i < h; i += 1) {
                            const y = i + (Math.random() - 0.5) * 0.6;
                            ctx.lineWidth = 1 + Math.random() * 0.8;
                            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
                        }
                        // subtle noise
                        ctx.globalAlpha = 0.06;
                        for (let i = 0; i < w * h * 0.0012; i++) { ctx.fillStyle = `rgba(0,0,0,${Math.random()*0.45})`; ctx.fillRect(Math.random()*w, Math.random()*h, 1, 1); }
                        return c;
                    }

                    function createPaperTexture(size = 2048) {
                        const c = document.createElement('canvas'); c.width = size; c.height = size/4; const ctx = c.getContext('2d');
                        ctx.fillStyle = '#efefef'; ctx.fillRect(0,0,c.width,c.height);
                        ctx.fillStyle = 'rgba(0,0,0,0.02)';
                        for (let i = 0; i < 80000; i++) ctx.fillRect(Math.random()*c.width, Math.random()*c.height, 1, 1);
                        return c;
                    }

                    function smoothstep(a, b, x) { const t = Math.max(0, Math.min(1, (x - a) / (b - a))); return t * t * (3 - 2 * t); }

                    function createInterlockingGeometry() {
                        const shape = new THREE.Shape();
                        // Perfil en 'H' con aristas rectas según boceto (más estrecho)
                        const pts = [
                            [-0.65,  0.50], // top-left outer
                            [-0.30,  0.50], // left inner notch start
                            [-0.30,  0.30], // notch inner top
                            [ 0.30,  0.30], // notch inner top right
                            [ 0.30,  0.50], // right inner notch top
                            [ 0.65,  0.50], // top-right outer
                            [ 0.65, -0.25], // right outer down
                            [ 0.43, -0.25], // right inner upper
                            [ 0.43, -0.45], // central bottom lowest
                            [-0.43, -0.45], // central bottom left
                            [-0.43, -0.25], // left inner upper
                            [-0.65, -0.25], // left outer down
                        ];

                        shape.moveTo(pts[0][0], pts[0][1]);
                        for (let i = 1; i < pts.length; i++) shape.lineTo(pts[i][0], pts[i][1]);
                        shape.closePath();

                        const geom = new THREE.ExtrudeGeometry(shape, {
                            depth: 2.00,
                            bevelEnabled: false,
                            curveSegments: 1
                        });
                        geom.center();
                        geom.rotateY(-0.08);
                        geom.rotateX(0.02);
                        return geom;
                    }

                    // create metal material
                    const grainCanvas = createMetalGrainTexture(2048, 512);
                    const roughTex = new THREE.CanvasTexture(grainCanvas); roughTex.wrapS = roughTex.wrapT = THREE.RepeatWrapping; roughTex.repeat.set(6, 2);
                    roughTex.encoding = THREE.sRGBEncoding;

                    // simple environment cube (studio-like) using colored faces
                    function makeStudioCubemap() {
                        const faces = [];
                        const cols = ['#111111','#f6f6f6','#efefef','#cfcfcf','#ffffff','#dddddd'];
                        for (let i = 0; i < 6; i++) {
                            const c = document.createElement('canvas'); c.width = 256; c.height = 256; const ctx = c.getContext('2d');
                            const g = ctx.createLinearGradient(0,0,256,256); g.addColorStop(0, cols[i]); g.addColorStop(1, '#111111'); ctx.fillStyle = g; ctx.fillRect(0,0,256,256);
                            faces.push(c);
                        }
                        const cube = new THREE.CubeTexture(faces);
                        cube.needsUpdate = true;
                        return cube;
                    }

                    const envCube = makeStudioCubemap(); scene.environment = envCube; scene.background = null;

                    const metalMat = new THREE.MeshStandardMaterial({
                        map: surfaceTex,
                        roughnessMap: roughTex,
                        roughness: 0.78,
                        metalness: 0.06,
                        envMapIntensity: 1.0,
                        side: THREE.FrontSide,
                        normalMap: poreNormalTex,
                        normalScale: new THREE.Vector2(0.6,0.6),
                        bumpMap: poreHeightTex,
                        bumpScale: 0.06
                    });

                    const part = new THREE.Mesh(createInterlockingGeometry(), metalMat);
                    part.position.y = -0.02;
                    scene.add(part);

                    // Base blanca con logo centrado (logo.png)
                    const baseCanvas = document.createElement('canvas');
                    baseCanvas.width = 2048;
                    baseCanvas.height = 2048;
                    const bctx = baseCanvas.getContext('2d');

                    function drawGroundBase() {
                        bctx.clearRect(0, 0, 2048, 2048);
                        bctx.fillStyle = '#ffffff';
                        bctx.fillRect(0, 0, 2048, 2048);
                    }

                    function drawGroundLogo(img) {
                        const iw = img.naturalWidth || img.width;
                        const ih = img.naturalHeight || img.height;
                        if (!iw || !ih) return;
                        const maxW = 2048 * 0.92;
                        const maxH = 2048 * 0.92;
                        const s = Math.min(maxW / iw, maxH / ih);
                        const w = Math.floor(iw * s);
                        const h = Math.floor(ih * s);
                        const x = Math.floor((2048 - w) / 2);
                        const y = Math.floor((2048 - h) / 2);
                        bctx.imageSmoothingEnabled = true;
                        bctx.imageSmoothingQuality = 'high';
                        bctx.drawImage(img, x, y, w, h);
                    }

                    drawGroundBase();
                    const baseTex = new THREE.CanvasTexture(baseCanvas);
                    baseTex.encoding = THREE.sRGBEncoding;
                    baseTex.wrapS = baseTex.wrapT = THREE.ClampToEdgeWrapping;

                    const baseSide = 8 * Math.sqrt(0.75) * 0.6;
                    const ground = new THREE.Mesh(
                        new THREE.PlaneGeometry(baseSide, baseSide),
                        new THREE.MeshStandardMaterial({ map: baseTex, color: 0xffffff, roughness: 0.98, metalness: 0 })
                    );
                    ground.rotation.x = -Math.PI / 2;
                    ground.position.y = -0.7;
                    scene.add(ground);

                    (function loadGroundLogo() {
                        const logoImg = new Image();
                        logoImg.onload = () => {
                            drawGroundBase();
                            drawGroundLogo(logoImg);
                            baseTex.needsUpdate = true;
                            if (statusEl) statusEl.textContent = 'Logo aplicado en la base';
                        };
                        logoImg.onerror = () => {
                            if (statusEl) statusEl.textContent = 'No se pudo cargar logo.png en la base';
                        };
                        try {
                            logoImg.src = new URL('logo.png', location.href).href;
                        } catch (e) {
                            logoImg.src = 'logo.png';
                        }
                    })();

                      if (statusEl) statusEl.textContent = 'Render 3D activo — usa ratón para girar';

                    function render() { requestAnimationFrame(render); renderer.render(scene, activeCamera); }
                    render();

                    const regenBtn2 = document.getElementById('regen');
                    if (regenBtn2) regenBtn2.addEventListener('click', (e) => { e.preventDefault(); // regenerar textura
                        sctx.fillStyle = '#7f7f7f'; sctx.fillRect(0, 0, 2048, 2048); sctx.globalAlpha = 0.42; sctx.fillStyle = '#a9a9a9'; for (let i = 0; i < 8000; i++) sctx.fillRect(Math.random() * 2048, Math.random() * 2048, Math.random() * 2, Math.random() * 2); sctx.globalAlpha = 1; for (let i = 0; i < 900; i++) { sctx.fillStyle = cols[Math.floor(Math.random() * cols.length)]; sctx.beginPath(); sctx.ellipse(Math.random() * 2048, Math.random() * 2048, 2 + Math.random() * 8, 1 + Math.random() * 6, Math.random() * Math.PI, 0, Math.PI * 2); sctx.fill(); } surfaceTex.needsUpdate = true; if (statusEl) statusEl.textContent = 'Textura regenerada'; });

                    // alternar vista ortográfica / perspectiva
                    const viewOrthoBtn = document.getElementById('viewOrtho');
                    if (viewOrthoBtn) viewOrthoBtn.addEventListener('click', () => {
                        activeCamera = (activeCamera === orthoCamera) ? perspCamera : orthoCamera;
                        if (statusEl) statusEl.textContent = activeCamera === orthoCamera ? 'Vista: Ortográfica' : 'Vista: Perspectiva';
                    });

                    // exportar PNG de alta resolución
                    async function exportPNG(scale = 3) {
                        const w = window.innerWidth, h = window.innerHeight;
                        const oldSize = renderer.getSize(new THREE.Vector2());
                        const oldPixelRatio = renderer.getPixelRatio();
                        renderer.setPixelRatio(1);
                        renderer.setSize(Math.floor(w * scale), Math.floor(h * scale));
                        renderer.render(scene, activeCamera);
                        const dataURL = renderer.domElement.toDataURL('image/png');
                        // restore
                        renderer.setSize(oldSize.x, oldSize.y);
                        renderer.setPixelRatio(oldPixelRatio);
                        // download
                        const a = document.createElement('a'); a.href = dataURL; a.download = 'modelo_ladrillo_highres.png'; document.body.appendChild(a); a.click(); a.remove();
                    }
                                        const exportHiResBtn2 = document.getElementById('exportHiRes'); if (exportHiResBtn2) exportHiResBtn2.addEventListener('click', () => { if (statusEl) statusEl.textContent = 'Exportando PNG...'; setTimeout(()=>exportPNG(3).then(()=>{ if (statusEl) statusEl.textContent='Exportado' }),100); });

                                        const toggleCutBtn3 = document.getElementById('toggleCut'); if (toggleCutBtn3) toggleCutBtn3.addEventListener('click', () => { if (statusEl) statusEl.textContent = 'Vista de corte: disponible al añadir clipping planes'; });

                                        const exportGLBBtn2 = document.getElementById('exportGLB'); if (exportGLBBtn2) exportGLBBtn2.addEventListener('click', () => {
                                                // GLTFExporter no disponible en este entorno sin servidor; ofrecer instrucción
                                                if (statusEl) statusEl.textContent = 'Export GLB requiere GLTFExporter (usa servidor HTTP o instálalo localmente)';
                                        });

                    window.addEventListener('resize', () => {
                        renderer.setSize(window.innerWidth, window.innerHeight);
                        perspCamera.aspect = window.innerWidth / window.innerHeight; perspCamera.updateProjectionMatrix();
                        const aspect2 = window.innerWidth / window.innerHeight;
                        const fr = frustumSize;
                        orthoCamera.left = -fr * aspect2 / 2; orthoCamera.right = fr * aspect2 / 2; orthoCamera.top = fr / 2; orthoCamera.bottom = -fr / 2; orthoCamera.updateProjectionMatrix();
                    });

                } catch (err) {
                    console.error('Error inicializando 3D:', err); startFallback2D();
                }
            } else {
                startFallback2D();
            }
        </script>
